<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A² Consultancy — Consultant Portal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0E1B4D;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      background: #ffffff;
      width: 400px;
      border-radius: 8px;
      padding: 48px 40px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
    }

    .logo {
      margin-bottom: 8px;
    }

    .logo img {
      width: 180px;
      height: auto;
    }

    .subtitle {
      color: #1a1a16;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 36px;
      opacity: 0.6;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #c9a84c;
      margin: 0 auto 36px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #4a4a44;
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d4d4d0;
      border-radius: 4px;
      font-size: 14px;
      color: #1a1a16;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 20px;
    }

    input[type="password"]:focus {
      border-color: #c9a84c;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #c9a84c;
      color: #0E1B4D;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #a8893a;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .error {
      display: none;
      color: #dc2626;
      font-size: 12px;
      margin-top: 14px;
      text-align: center;
    }

    .error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"><img src="/website/A-Square Consultancy Logo.png" alt="A² Consultancy"></div>
    <div class="divider"></div>
    <p class="subtitle">Consultant Portal</p>

    <form id="loginForm">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter portal password" autofocus>
      <button type="submit" id="submitBtn">Enter Portal</button>
      <p class="error" id="errorMsg">Incorrect password. Please try again.</p>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btn.textContent = 'Verifying…';
      errorMsg.classList.remove('visible');

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/';
        } else {
          errorMsg.classList.add('visible');
          btn.disabled = false;
          btn.textContent = 'Enter Portal';
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (err) {
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Enter Portal';
      }
    });
  </script>
</body>
</html>
